####################################################################
# Telemetry Requirements
####################################################################

telemetry:

  #
  # Observation window used for analysis.
  #
  observation_window_days: 1

  #
  # Minimum number of metric samples required
  # before a recommendation can be trusted.
  #
  minimum_sample_count: 5

  #
  # Minimum percentage of expected samples that
  # must be available.
  #
  minimum_coverage_percent: 5

  #
  # If true, recommendations may still be produced
  # even when confidence is low.
  #
  allow_low_confidence: true

####################################################################
# Decision Policy
####################################################################

decision:

  cpu:

    #
    # Recommend increasing VM capacity when the
    # average CPU utilization exceeds this value.
    #
    upsize_threshold: 15

    #
    # CPU must remain below this value before a
    # downsize can be considered.
    #
    downsize_threshold: 4

  memory:

    #
    # Recommend increasing VM capacity when the
    # average memory utilization exceeds this value.
    #
    upsize_threshold: 97

    #
    # Memory must remain below this value before a
    # downsize can be considered.
    #
    downsize_threshold: 70

####################################################################
# Confidence Levels
####################################################################

confidence:

  high: 90

  medium: 70

  low: 30

####################################################################
# Policy Metadata
####################################################################

policy:

  version: "1.0"